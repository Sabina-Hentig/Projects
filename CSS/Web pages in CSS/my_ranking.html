
 <!DOCTYPE html>
<html lang="en">
<head>
	<style>
		.center {
			display: block;
			margin-left: auto;
			margin-right: auto;
			width: 50%;
		}
		.container {
		  position: relative;
		  width: 50%;
		}

		.image {
			opacity: 1;
			display: block;
			width: 100%;
			transition: .5s ease;
			backface-visibility: hidden;
			margin-left: auto;
			margin-right: auto;
		}

		.middle {
		  transition: .5s ease;
		  opacity: 0;
		  position: absolute;
		  top: 50%;
		  left: 50%;
		  transform: translate(-50%, -50%);
		  -ms-transform: translate(-50%, -50%);
		  text-align: center;
		}

		.container:hover .image {
		  opacity: 0.3;
		}

		.container:hover .middle {
		  opacity: 1;
		}

		.text {
		  background-color: #04AA6D;
		  color: white;
		  font-size: 16px;
		  padding: 16px 32px;
		}
		#customers {
		  font-family: Arial, Helvetica, sans-serif;
		  border-collapse: collapse;
		  width: 100%;
		}

		#customers td, #customers th {
		  border: 1px solid #ddd;
		  padding: 8px;
		}

		#customers tr:nth-child(even){background-color: PaleTurquoise;}

		#customers tr:hover {background-color: LightSeaGreen;}

		#customers th {
		  padding-top: 12px;
		  padding-bottom: 12px;
		  text-align: left;
		  background-color: SlateBlue;
		  color: white;
		}
	</style>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title><b>Cats</b></title>
</head>
<body style="background-color: LightCyan">

<main>
<h1><strong>My Ranking</strong></h1>

<table id="customers">
  <tr>
    <th>Rank</th>
    <th>Breed</th>
    <th>Image</th>
  </tr>
  <tr>
    <td>1</td>
    <td>Ragdoll</td>
    <td>
		<div class="container">
			<img src="Cats/Ragdoll.png" class="image" >
			<div class="middle">
				<div class="text">Ragdoll</div>
			</div>
		</div>
	</td>
  </tr>
  <tr>
    <td>2</td>
    <td>Main Coon</td>
    <td>
		<div class="container">
			<img src="Cats/Main-Coon.jpg" class="image" >
			<div class="middle">
				<div class="text">Main Coon</div>
			</div>
		</div>
	</td>
  </tr>
  <tr>
    <td>3</td>
    <td>Siamese</td>
    <td>
		<div class="container">
			<img src="Cats/Siamese.jpg" class="image" >
			<div class="middle">
				<div class="text">Siamese</div>
			</div>
		</div>
	</td>
  </tr>
  <tr>
    <td>4</td>
    <td>Russian Blue</td>
    <td>
		<div class="container">
			<img src="Cats/Russian-Blue.jpg" class="image">
			<div class="middle">
				<div class="text">Russian Blue</div>
			</div>
		</div>
	</td>
  </tr>
</table>

</main>

</body>
</html>
