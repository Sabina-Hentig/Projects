<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculate Circle Area</title>
</head>
<body>
  <form id="circleForm">
    <label for="radius">Enter the radius of the circle:</label>
    <input type="text" id="radius" name="radius" required>
    <button type="submit">Calculate Area</button>
  </form>

  <script>
    document.getElementById("circleForm").addEventListener("submit", function(event) {
      event.preventDefault(); // Prevent form submission

      // Get the radius value from the input field
      var radius = parseFloat(document.getElementById("radius").value);

      // Check if the radius is a valid number
      if (!isNaN(radius)) {
        // Calculate the area of the circle
        var area = Math.PI * Math.pow(radius, 2);

        // Display the area in an alert box
        alert("The area of the circle is: " + area.toFixed(2));
      } else {
        alert("Please enter a valid radius.");
      }
    });
  </script>
</body>
</html>
