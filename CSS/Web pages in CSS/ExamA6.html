
<!DOCTYPE html>
<html lang="en">
	<head>
	  <meta charset="UTF-8">

	  <title>Grid Tablouri</title>
	  <link rel="stylesheet" href="Exam.css">

  <style>
    .container {
      width: 1250x;
	  height: 750px;
      position: absolute;
    }
	.col{
      width: 50%;
    }

  </style>
  
	</head>
	<body>

	<div class="container">

		  <img src="Tablouri/Michelangelo_-_Creation_of_Adam.jpg" alt="Creation of Adam">
		</div>

		  <img src="Tablouri/Sandro_Botticelli-The_Birth_Of_Venus.jpg" alt="The Birth Of Venus">
		</div>
	  </div>
	  <div class="row">
		<div class="col">
		  <img src="Tablouri/Leonardo_da_Vinci_-_Mona_Lisa.jpg" alt="Mona Lisa">
		</div>
		<div class="col">
		 <img src="Tablouri/Edvard_Munch_The-Scream.jpg">
		</div>
		<div class="col">
		  <img src="Tablouri/Gustav_Klimt_The-Kiss.jpg" alt="The Kiss">

	  </div>
	</div>
	
</body>
