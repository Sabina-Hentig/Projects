<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="stylesheet" href="lab3.css">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title><b>Cats</b></title>
</head>
<body>

<main>
<h1><strong>Slide Show</strong></h1>


	<section>
		<div class="mySlide" >
		
		<h2><strong>Cat breeds</strong></h2>
			<div class="container">
			  <div class="mySlides">
				<div class="numbertext">1 / 3</div>
				<img src="Cats/Ragdoll.png" class="center">
			  </div>

			  <div class="mySlides">
				<div class="numbertext">2 / 3</div>
				<img src="Cats/Siamese.jpg" class="center">
			  </div>

			  <div class="mySlides">
				<div class="numbertext">3 / 3</div>
				<img src="Cats/Main-Coon.jpg" class="center">
			  </div>
				
			  <a class="prev" onclick="plusSlides(-1)">❮</a>
			  <a class="next" onclick="plusSlides(1)">❯</a>

			  <div class="caption-container">
				<p id="caption"></p>
			  </div>

			  <div class="row">
				<div class="column">
				  <img class="demo cursor" src="Cats/Ragdoll.png"  style="width:100%" onclick="currentSlide(1)" alt="Ragdoll">
				</div>
				<div class="column">
				  <img class="demo cursor" src="Cats/Siamese.jpg" style="width:100%" onclick="currentSlide(2)" alt="Siamese">
				</div>
				<div class="column">
				  <img class="demo cursor" src="Cats/Main-Coon.jpg" style="width:100%" onclick="currentSlide(3)" alt="Maine Coon">
				</div>
			  </div>
			</div>	
		<script>
			let slideIndex = 1;
			showSlides(slideIndex);

			function plusSlides(n) {
			  showSlides(slideIndex += n);
			}

			function currentSlide(n) {
			  showSlides(slideIndex = n);
			}

			function showSlides(n) {
			  let i;
			  let slides = document.getElementsByClassName("mySlides");
			  let dots = document.getElementsByClassName("demo");
			  let captionText = document.getElementById("caption");
			  if (n > slides.length) {slideIndex = 1}
			  if (n < 1) {slideIndex = slides.length}
			  for (i = 0; i < slides.length; i++) {
				slides[i].style.display = "none";
			  }
			  for (i = 0; i < dots.length; i++) {
				dots[i].className = dots[i].className.replace(" active", "");
			  }
			  slides[slideIndex-1].style.display = "block";
			  dots[slideIndex-1].className += " active";
			  captionText.innerHTML = dots[slideIndex-1].alt;
			}
		</script>	
		</div>	
	</section>

</main>

</body>
</html>
